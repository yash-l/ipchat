services:
  - type: web
    name: messenger-app
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PHONE_HASH_SECRET
        generateValue: true
      - key: MESSAGE_ENCRYPTION_KEY
        sync: false
      - key: OWNER_PHONE_E164
        sync: false
      - key: OTP_DELIVERY_MODE
        value: ADMIN_PORTAL
      - key: SMS_PROVIDER_API_KEY
        sync: false
    healthCheckPath: /api/health
